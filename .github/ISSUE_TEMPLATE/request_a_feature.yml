name: Feature Request
description: Got an idea? Share it here!
title: "[💡]: "
labels: [ "enhancement" ]
body:
  - type: markdown
    attributes:
      value: |
        ### Have a cool idea?
        Before posting, please quickly check the **Mod Wiki** and existing issues to see if your idea is already planned or available!

  - type: textarea
    id: idea
    attributes:
      label: Your Suggestion
      description: What would you like to see added and how should it work?
      placeholder: "I think it would be cool if..."
    validations:
      required: true


  - type: textarea
    id: context
    attributes:
      label: Extra Context
      description: Anything else? (Why it's needed, screenshots, or sketches)
      placeholder: "This would help with..."
    validations:
      required: false
